<!--
  SPORTS ARTICLE TEMPLATE — not built directly (not registered in build.js's PAGES array).

  To publish a new article:
  1. Copy this file + _article-template.content.html to
     src/pages/sports/<article-slug>.head.html and src/pages/sports/<article-slug>.content.html
  2. Replace every ALL-CAPS [PLACEHOLDER] below with the real title, description, date, etc.
  3. Register it in build.js's PAGES array:
       { name: 'sports/<article-slug>', active: 'sports' }
  4. Add a card for it to src/pages/sports/index.content.html (top of the "Recent Articles" grid).
  5. Add its URL to sitemap.xml.
  6. Run `node build.js`.
-->
  <title>[ARTICLE TITLE] | Black Maple Sports</title>
  <meta name="description" content="[ONE-SENTENCE META DESCRIPTION — 150-160 CHARACTERS, SUMMARIZES THE ARTICLE FOR SEARCH RESULTS]" />
  <meta name="author" content="Black Maple Digital" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://blackmaple.co/sports/[ARTICLE-SLUG].html" />
  <meta name="theme-color" content="#0b0f0d" />

  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Black Maple Digital" />
  <meta property="og:title" content="[ARTICLE TITLE] | Black Maple Sports" />
  <meta property="og:description" content="[SAME OR SIMILAR TO META DESCRIPTION ABOVE]" />
  <meta property="og:image" content="/assets/img/sports/[ARTICLE-SLUG].jpg" />
  <meta property="og:url" content="https://blackmaple.co/sports/[ARTICLE-SLUG].html" />
  <meta property="article:published_time" content="[YYYY-MM-DD]" />
  <meta property="article:section" content="[CATEGORY, e.g. NFL / Detroit Lions / Michigan Football]" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="[ARTICLE TITLE] | Black Maple Sports" />
  <meta name="twitter:description" content="[SAME OR SIMILAR TO META DESCRIPTION ABOVE]" />
  <meta name="twitter:image" content="/assets/img/sports/[ARTICLE-SLUG].jpg" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "[ARTICLE TITLE]",
    "description": "[SAME OR SIMILAR TO META DESCRIPTION ABOVE]",
    "image": "https://blackmaple.co/assets/img/sports/[ARTICLE-SLUG].jpg",
    "datePublished": "[YYYY-MM-DD]",
    "dateModified": "[YYYY-MM-DD]",
    "author": { "@type": "Organization", "name": "Black Maple Sports", "url": "https://blackmaple.co/sports/index.html" },
    "publisher": {
      "@type": "Organization",
      "name": "Black Maple Digital",
      "logo": { "@type": "ImageObject", "url": "https://blackmaple.co/logo.svg" }
    },
    "mainEntityOfPage": { "@type": "WebPage", "@id": "https://blackmaple.co/sports/[ARTICLE-SLUG].html" }
  }
  </script>
